name: Render CV and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Render CV
        run: uv run --with "rendercv[full]" rendercv render Artem_Yushkovskiy_CV.yaml -o out

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp out/Artem_Yushkovskiy_CV.pdf _site/
          cp out/Artem_Yushkovskiy_CV.html _site/index.html
          cp out/Artem_Yushkovskiy_CV_*.png _site/ 2>/dev/null || true
          cp style.css _site/
          sed -i 's|</style>|</style>\n    <link rel="stylesheet" href="style.css">|' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
