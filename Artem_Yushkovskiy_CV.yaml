  sections:
    summary:
    - 'AI Platform Engineer and Tech Lead with 10+ years spanning security research,
      ML platforms, and high-scale distributed AI systems. Led a squad of 10, driving
      technical direction for AI infrastructure at global scale: self-hosted image
      generation (100K+ of images nightly in batch, as well as live near-realtime
      streaming), 20+ parametrized fraud detection model ensembles across 70+ countries (<10ms latency),
      internal ML platform on top of GCP Vertex AI used by 5+ teams. Designed and open-sourced
      [asya.sh](https://asya.sh), a Kubernetes-native actor mesh for AI workloads
      presented at KubeCon EU 2026.
      Looking to build global AI platforms that let teams ship, test, and
      scale AI and ML workloads fast.'
    experience:
    - company: Delivery Hero
      position: Sr AI Engineer - Distributed AI Orchestration, GenAI (images)
      location: Berlin, DE
      start_date: 2023-08
      end_date: present
      highlights:
      - 'Owned architecture decisions for a 10-person squad (5 engineers, 5 data
        scientists); championed modular AI over monolithic models: smart routing to
        specialized models per problem type rather than one large black-box model,
        enabling divide-and-conquer at scale with clear ownership boundaries
        (engineers own infra/pre-processing, data scientists own model logic and
        deployment via platform tooling)'
      - Designed and scaled a self-hosted AI image processing platform on AWS/Kubernetes;
        GPU-bound multi-model pipelines per image (production models, scoring, analysis,
        guardrails), self-hosted under strict cost constraints; 100K+ of images nightly
        in batch, migrated to near-realtime streaming (<5 min SLA, shrinking) with zero
        application code changes; early A/B tests show measurable lift in clicks and
        purchases at global scale
      - Designed CI/CD for monorepo with 15+ model packages building multi-GB GPU images;
        reduced end-to-end deployment cycle from days to ~1 hour; build time
        4h → 20 min (cache miss), 1h → 6 min (cache hit); for some workloads pod startup time reduced 20 min → 3 min;
        image sizes 3-4x smaller [Docker Buildx, uv, optimized layer caching]
      - 'Recognized the actor mesh pattern''s general value for AI and agentic workloads
        beyond image processing; drove the initiative to re-implement and open-source it
        as [asya.sh](https://asya.sh); developed using high-velocity AI-assisted workflow
        over ~3 months (core actors → Crossplane migration → agentic features → DevX);
        now live and being adopted internally'
      # Interview prep - asya complexity & AI-assisted development stats:
      # Scope: K8s-native, highly modular, Crossplane-based (was custom operator, migrated)
      #   CRDs, transport plugins (adding new transport e.g. Pub/Sub/Kafka = ~1 day, ~$100, ~1K LOC with tests)
      #   Not a CLI tool - full cloud-native platform with operator, CRDs, KEDA integration
      # Timeline: ~3.5 months (Oct-mid Nov 2025: core;
      #   Feb-Mar 2026: Crossplane migration (-30K LOC), A2A, streaming, flow compilation, DevX)
      # Sniffly stats (post-Dec 2025 only, pre-Oct data deleted):
      #   3,251 commands, 140 sessions, 67K messages, 18.2M tokens, $6.3K API cost
      #   33,228 tool calls, avg 9.34 steps/command, longest chain 356 steps
      #   2.7% interruption rate (high trust, not vibe coding), 96.6% cache hit rate
      #   Models: Opus 4.6 (~70%), Sonnet 4.6 (~28%)
      # Talking point: for cloud-native complexity (CRDs, Crossplane, transport abstraction,
      #   KEDA autoscaling), ~3.5 months is very tight - demonstrates high productivity
      #   with AI-assisted development while maintaining code quality and architectural control
      - 'Authored company-wide RFC on GPU capacity and cost strategy (training + serving):
        18-36 month demand forecasting, usage patterns across teams, negotiation
        baseline for cloud provider agreements; defined SLA targets and cost governance
        for GPU workloads'
      - Mentored engineers through two promotions (junior → mid, mid → senior);
        continuously coaching data scientists on engineering best practices (testing,
        CI/CD, clean code) to raise tech culture across the team; active contributor
        to ML chapter and weekly operations reviews, driving cross-team knowledge sharing
        # * System design / architecture thinking - helping them see beyond their ticket
        # * Ownership and autonomy - growing them to own features end-to-end
        # * Code review quality - not just "fix this" but teaching them to spot patterns
    - company: Delivery Hero
      position: ML Engineer, ML Platform → Fraud Detection
      location: Berlin, DE
      start_date: 2021-11
      end_date: 2023-08
      highlights:
      - Designed and built an internal ML Platform on GCP Vertex AI, providing shared
        data and ML pipeline infrastructure across teams (CLV, food ontology,
        dish normalization, email suspicion, fraud detection)
      - 'Owned full lifecycle of 20+ parameterized ML models for voucher fraud detection
        across 70+ countries (4 continents): built end-to-end CI/CD enabling data
        scientists to iterate fast against rapidly shifting fraud patterns (nightly
        batch pipelines on BigQuery/Airflow, per-country model training on Vertex AI,
        automated evaluation with data drift tracking via Evidently, results reported
        to GitHub Actions for promotion decisions), saving $100K+/month'
      - 'Two-model serving pipeline: email suspicion (DynamoDB caching) → fraud
        scoring consuming multiple signals → rule-based system; FastAPI + XGBoost,
        optimized to <10ms per request on every food order'
      - Engineered dataset versioning for strict model comparability without data
        leakage; re-implemented across two teams, then proposed as a company-wide
        standard (RFC adoption in progress)
      - On-call SRE for fraud models and global Customer Data Platform (low-latency
        feature aggregation, Flink, DynamoDB); monitoring and observability (DataDog,
        OpsGenie)
      - 'Co-authored with Google: "[How Delivery Hero connected GitHub with Vertex AI
        to manage 20+ voucher fraud detection models](https://cloud.google.com/blog/products/ai-machine-learning/delivery-hero-takes-on-voucher-fraud-with-google-cloud-ai)" (Google Cloud Blog, Nov 2023)'
    - company: Neuromation / Neu.ro
      position: Software Engineer → MLOps Engineer
      location: St Petersburg, RU
      start_date: 2018
      end_date: 2021
      highlights:
      - 'Built core of a multi-cloud Kubernetes-based ML platform ("Docker-like
        experience on any cloud and bare metal"): REST API microservices, CLI/SDK,
        user management, distributed storage, resource orchestration'
      - Prototyped and integrated ML tooling into the platform (DVC, Seldon, Feast,
        Pachyderm); ran internal Kubernetes seminars for the team
      - Led production computer vision projects for clients (object detection,
        classification, RabbitMQ-driven inference, MongoDB, Kubernetes)
      # Expanded details (from old CV ~/Downloads/Artem - Resume (outdated).docx):
      # Title progression: Software Engineer (Python) Oct 2018 – Jul 2020, then MLOps Engineer Jul 2020 – Jul 2021
      # Platform "Neuromation" later rebranded to "Neu.ro"
      # SW Eng responsibilities: development of ML platform REST API microservices managing
      #   distributed K8s cluster (multi-cloud), backend: user mgmt, distributed storage,
      #   resource orchestration via K8s; user-facing: CLI, SDK, user workflows,
      #   integration with ML frameworks and tools; design, implementation, maintenance
      # MLOps Eng responsibilities: supporting clients of MLOps-as-a-service platform Neu.ro,
      #   developing full-cycle ML/Ops solutions with monitoring, versioning, complex
      #   inference setup, and closed ML feedback loop; product research to improve
      #   Neu.ro platform and integrate other tools
      # Client project (retail domain): full-cycle ML/Ops solution - Computer Vision
      #   (object detection and classification), RabbitMQ-driven inference, data persistency
      #   to MongoDB, data analytics, deployed on Kubernetes
      # Community: leading ask-me-anything initiative in MLOps Community (also in Speaking section)
      # Internal: ran Kubernetes seminars for colleagues
      # Tools: DVC, Seldon, Feast, Pachyderm, Prometheus, Grafana, RabbitMQ, MongoDB
    - company: ptsecurity, Aalto University
      position: Security Researcher → Software Engineer
      # location: St Petersburg, RU
      start_date: 2015
      end_date: 2018
      highlights:
      - Automated QA of web security scanners and application firewalls (DAST, SAST, WAF),
        vulnerability search, static code analysis, abstract interpretation, SMT solvers
      - Portability analysis of C-like programs (MSc thesis project)
      # Expanded details:
      # ptsecurity = Positive Technologies (company under US/EU sanctions, using short name)
      # Role at ptsecurity: QA automation engineer for web security products
      #   - automated testing of web application security scanners (DAST) and WAFs
      #   - vulnerability research, static code analysis tools
      #   - abstract interpretation, SMT solvers
      # Role at Aalto University: MSc thesis research
      #   - thesis: "Automated Analysis of Weak Memory Models"
      #   - portability analysis of distributed systems
      # Hackathon: Vector Search Engineering Lab (2022) with Redis vector search
      #   - https://paulomaia20.medium.com/vector-search-engineering-lab-untitled1-cfa86576f1dc
    projects:
    - name: Asya🎭 - Open-source Kubernetes-native Actor Mesh for AI Orchestration
      date: 2025-11
      highlights:
      - 'Distilled from 3+ years of production AI workloads; Crossplane-based, sidecar
        architecture (Python runtime + Asya sidecar), pluggable transports (SQS, RabbitMQ,
        Pub/Sub), pluggable state backends (S3, GCS, Redis, NATS KV)'
      - 'Stateless actors with dynamic routing ("the message knows the way"); flow
        compiler translates Python control flow into actor graphs; KEDA-based per-actor
        autoscaling including scale-to-zero'
      - 'Gateway protocols: A2A agents, MCP tools, SSE streaming, REST; pure Python
        handlers with zero framework coupling, testable locally'
      - 'Clean separation of business logic (data scientists)
        and infrastructure config (platform engineers), solving the ownership handover
        problem in AI teams ("two files, two owners")'
      - '[asya.sh](https://asya.sh) | [GitHub](https://github.com/deliveryhero/asya)'
      # Comparison docs at asya.sh/docs/comparisons/ cover 14 systems across 7 categories:
      #   Workflow orchestrators (Temporal, Argo, Airflow, Prefect, Dagster)
      #   Actor frameworks (Erlang/OTP, Akka/Pekko, Orleans, Dapr)
      #   Agentic frameworks (LangGraph, CrewAI, Google ADK, AutoGen, KAgent)
      #   ML pipelines (KFP, Flyte, Metaflow, ZenML)
      #   Stream processing (Flink, Kafka Streams, Spark Streaming)
      #   AI/ML serving (KServe, KAITO, KubeAI, vLLM, LLM-d)
      #   K8s job schedulers (Kueue, Run.ai, Volcano)
      # In-depth 1:1 comparisons: Temporal, Dapr, LangGraph, ADK, KAgent, Ray Serve, KFP
      # Great interview talking point for "deep knowledge of agent framework internals"
