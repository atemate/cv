cv:
  name: Artem Yushkovskiy
  headline: AI Platform Engineer & Tech Lead  •  Distributed AI Orchestration  •  Cloud-native
    (K8s, GCP, AWS)
  location: Berlin, Germany
  email: atemate@duck.com
  social_networks:
